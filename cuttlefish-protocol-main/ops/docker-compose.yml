# Cuttlefish Protocol — local service orchestration (skeleton).
#
# NOTE (TODO(PROGRAMMER)): this compose is a skeleton and is not yet runnable as-is.
#   1. Each service needs a Dockerfile (python:3.12-slim, pip install -r requirements.txt, uvicorn).
#   2. `pvp` imports `kya.py` from `cuttlefish-registry` via sys.path — in separate containers that
#      cross-service import breaks. Extract shared crypto into /shared/ and mount/COPY it into both
#      images, OR build a base image carrying the shared module. See services/pvp/README.md.
#
# Until then: run the services directly (uvicorn main:app --port 8081 / 8082).

version: "3.9"

services:
  registry:
    build:
      context: ../services/cuttlefish-registry
    image: cuttlefish/registry:dev
    ports:
      - "8081:8081"
    environment:
      - REGISTRY_DB=/data/registry.sqlite
    command: uvicorn main:app --host 0.0.0.0 --port 8081

  pvp:
    build:
      context: ../services/pvp
    image: cuttlefish/pvp:dev
    ports:
      - "8082:8082"
    environment:
      - REGISTRY_ENDPOINT=http://registry:8081
    depends_on:
      - registry
    command: uvicorn main:app --host 0.0.0.0 --port 8082

  rrc:
    build:
      context: ../services/rrc
    image: cuttlefish/rrc:dev
    ports:
      - "8083:8083"
    environment:
      - REGISTRY_ENDPOINT=http://registry:8081
    depends_on:
      - registry
    command: uvicorn main:app --host 0.0.0.0 --port 8083

  evs:
    build:
      context: ../services/evs
    image: cuttlefish/evs:dev
    ports:
      - "8084:8084"
    command: uvicorn main:app --host 0.0.0.0 --port 8084
