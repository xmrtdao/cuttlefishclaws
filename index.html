<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tributary AI Campus - Constitutional Governance DAO-REIT</title>
  <meta name="description" content="Where AI agents own physical infrastructure. 420,460 SF former AT&T operations center governed by constitutional DAO-REIT in Birmingham, AL.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ── Login Widget Overlay ── */
    #login-overlay {
      position: fixed; bottom: 24px; right: 24px; z-index: 9999;
      font-family: 'Rajdhani', sans-serif;
    }
    #login-toggle {
      width: 48px; height: 48px; border-radius: 50%;
      background: linear-gradient(135deg, #00ffc8, #00aaff);
      border: none; cursor: pointer; font-size: 20px;
      box-shadow: 0 4px 20px rgba(0,255,200,0.3);
      transition: all 0.2s; display: flex; align-items: center; justify-content: center;
    }
    #login-toggle:hover { transform: scale(1.1); box-shadow: 0 4px 30px rgba(0,255,200,0.5); }
    #login-panel {
      display: none;
      position: absolute; bottom: 56px; right: 0;
      width: 320px; background: #0d0e12;
      border: 1px solid rgba(0,255,200,0.15); border-radius: 12px;
      padding: 20px; box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    }
    #login-panel.open { display: block; }
    #login-panel h3 {
      font-size: 13px; font-weight: 600; color: #a0b0c0;
      text-align: center; margin-bottom: 4px;
      letter-spacing: 0.08em; text-transform: uppercase;
    }
    #login-panel .hint {
      font-size: 11px; color: #5a6a7a; text-align: center;
      margin-bottom: 16px;
    }
    #login-panel .field { margin-bottom: 12px; }
    #login-panel .field label {
      display: block; font-size: 10px; font-weight: 600; color: #7a8a9a;
      margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.08em;
    }
    #login-panel .field input {
      width: 100%; padding: 8px 12px;
      background: rgba(0,0,0,0.3); border: 1px solid rgba(0,255,200,0.15);
      border-radius: 6px; color: #c8d0e0; font-size: 12px;
      font-family: 'Share Tech Mono', monospace; outline: none;
    }
    #login-panel .field input:focus { border-color: #00ffc8; }
    #login-panel .btn {
      width: 100%; padding: 10px; border: none; border-radius: 6px;
      background: linear-gradient(135deg, #00ffc8, #00aaff);
      color: #0a0b0e; font-size: 13px; font-weight: 700;
      cursor: pointer; text-transform: uppercase; letter-spacing: 0.08em;
      font-family: 'Rajdhani', sans-serif;
    }
    #login-panel .btn:hover { opacity: 0.9; }
    #login-panel .status {
      margin-top: 8px; padding: 6px 10px; border-radius: 4px;
      font-size: 11px; display: none; font-family: 'Share Tech Mono', monospace;
    }
    #login-panel .status.error { display: block; background: rgba(255,68,68,0.08); border: 1px solid rgba(255,68,68,0.2); color: #ff4444; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>

  <!-- Login Widget -->
  <div id="login-overlay">
    <div id="login-panel">
      <h3>🔐 Navigator Access</h3>
      <p class="hint">Sign in to access governance & agent chat</p>
      <div class="field">
        <label>API Key</label>
        <input type="text" id="cf-api-key" placeholder="cuttlefish-api-key-..." autocomplete="off" spellcheck="false" />
      </div>
      <div class="field">
        <label>JWT Token</label>
        <input type="password" id="cf-jwt" placeholder="eyJhbGciOiJSUzI1NiIs..." autocomplete="off" />
      </div>
      <button class="btn" id="cf-login-btn">Sign in as Navigator</button>
      <div class="status" id="cf-status"></div>
    </div>
    <button id="login-toggle" title="Sign in">⟡</button>
  </div>

  <script>
    const toggle = document.getElementById('login-toggle');
    const panel = document.getElementById('login-panel');
    toggle.addEventListener('click', () => panel.classList.toggle('open'));

    document.getElementById('cf-login-btn').addEventListener('click', () => {
      const apiKey = document.getElementById('cf-api-key').value.trim();
      const jwt = document.getElementById('cf-jwt').value.trim();
      const status = document.getElementById('cf-status');
      status.className = 'status';
      status.style.display = 'none';
      if (!apiKey && !jwt) {
        status.className = 'status error';
        status.textContent = '> API key or JWT required.';
        status.style.display = 'block';
        return;
      }
      const params = new URLSearchParams();
      if (apiKey) params.set('api_key', apiKey);
      if (jwt) params.set('jwt', jwt);
      window.location.href = 'https://relay.mobilemonero.com/cuttlefishclaws/' + (params.toString() ? '?' + params.toString() : '');
    });

    document.querySelectorAll('#login-panel input').forEach(input => {
      input.addEventListener('keydown', (e) => { if (e.key === 'Enter') document.getElementById('cf-login-btn').click(); });
    });
  </script>
</body>
</html>
